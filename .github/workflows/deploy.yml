name: PHP Deploy Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Remote SSH to Execution Commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. ตรวจสอบว่ามีโฟลเดอร์ /var/www/project ไหม ถ้าไม่มีให้สร้างขึ้นมาทันที
            if [ ! -d "/var/www/project" ]; then
              sudo mkdir -p /var/www/project
              sudo chown -R ${{ secrets.SERVER_USER }}:www-data /var/www/project
            fi

            # 2. วิ่งเข้าโฟลเดอร์ปลายทาง
            cd /var/www/project

            # 3. ถ้าในโฟลเดอร์ยังไม่มีโปรเจกต์ Git ให้ทำการ Clone ลงมาครั้งแรก
            if [ ! -d ".git" ]; then
              git clone https://github.com/aomsin131263-sketch/aphiwat20.git .
            else
              # 4. ถ้ามีอยู่แล้ว ให้ดึงโค้ดเวอร์ชันล่าสุดมาอัปเดตแทน
              git fetch origin
              git reset --hard origin/main
            fi
